# Server Configuration
server.port=${SERVER_PORT:8080}

# Groq API Configuration - FIXED URL
groq.api.key=${GROQ_API_KEY}
groq.api.url=${GROQ_API_URL:https://api.groq.com/openai/v1}
groq.model=${GROQ_MODEL:llama3-70b-8192}

# PostgreSQL (Neon) Configuration - USING YOUR EXACT URL
spring.datasource.url=${DB_URL:jdbc:postgresql://ep-muddy-mountain-am5eyj3o-pooler.c-5.us-east-1.aws.neon.tech:5432/aura?sslmode=require}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hikari Connection Pool Settings
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.pool-name=NeonHikariPool

# JPA / Hibernate - Explicit dialect
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Kafka Configuration
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}

# Producer Configuration
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Consumer Configuration - FIXED
spring.kafka.consumer.group-id=${KAFKA_GROUP_ID:chatbot-group}
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.consumer.properties.spring.json.default.type=java.util.HashMap

# Brevo API Configuration
brevo.api.key=${BREVO_API_KEY}
brevo.api.url=${BREVO_API_URL:https://api.brevo.com/v3/smtp/email}
brevo.sender.email=${BREVO_SENDER_EMAIL}
brevo.sender.name=${BREVO_SENDER_NAME}

# Kafka Topics
kafka.topic.chat-messages=${KAFKA_TOPIC_CHAT:chat-messages}
kafka.topic.user-events=${KAFKA_TOPIC_AUTH:user-events}

# Email Configuration using Brevo SMTP
spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587
spring.mail.username=${BREVO_SMTP_USERNAME}
spring.mail.password=${BREVO_SMTP_KEY}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Email sender configuration
email.sender.email=${EMAIL_SENDER:azeezazeez7989@gmail.com}
email.sender.name=${EMAIL_SENDER_NAME:NEXUS AI}

# OTP Configuration
otp.expiration.minutes=10
otp.length=6

# Logging
logging.level.com.ai.chatbot_backend=DEBUG
logging.level.org.springframework.kafka=WARN
logging.level.org.springframework.mail=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.file.path=${LOG_FILE_PATH:logs}
logging.file.name=${LOG_FILE_NAME:logs/chatbot-application.log}

# Session Configuration
server.servlet.session.timeout=3600s
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax