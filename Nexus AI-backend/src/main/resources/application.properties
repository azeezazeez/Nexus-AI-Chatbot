# Server Configuration
server.port=${SERVER_PORT:8080}

# Groq API Configuration
groq.api.key=${GROQ_API_KEY}
groq.api.url=${GROQ_API_URL:https://api.groq.com/openai/v1}
groq.model=${GROQ_MODEL:meta-llama/llama-4-scout-17b-16e-instruct}

# PostgreSQL (Neon) Configuration
spring.datasource.url=${DB_URL:jdbc:postgresql://ep-muddy-mountain-am5eyj3o-pooler.c-5.us-east-1.aws.neon.tech:5432/aura?sslmode=require}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hikari Connection Pool Settings
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.pool-name=NeonHikariPool

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# ? Redis Configuration (replaces Kafka)
spring.data.redis.url=${REDIS_URL:redis://localhost:6379}

# Brevo API Configuration
brevo.api.key=${BREVO_API_KEY}
brevo.api.url=${BREVO_API_URL:https://api.brevo.com/v3/smtp/email}
brevo.sender.email=${BREVO_SENDER_EMAIL}
brevo.sender.name=${BREVO_SENDER_NAME}

# Email Configuration using Brevo SMTP
spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587
spring.mail.username=${BREVO_SMTP_USERNAME}
spring.mail.password=${BREVO_SMTP_KEY}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Email sender configuration
email.sender.email=${EMAIL_SENDER:azeezazeez7989@gmail.com}
email.sender.name=${EMAIL_SENDER_NAME:NEXUS AI}

# OTP Configuration
otp.expiration.minutes=10
otp.length=6

# Logging
logging.level.com.ai.chatbot_backend=DEBUG
logging.level.org.springframework.mail=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.file.path=${LOG_FILE_PATH:logs}
logging.file.name=${LOG_FILE_NAME:logs/chatbot-application.log}

# Session Configuration
server.servlet.session.timeout=3600s
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=none
server.servlet.session.cookie.secure=true
