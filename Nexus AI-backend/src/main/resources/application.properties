# ================================
# Server Configuration
# ================================
server.port=${PORT:8080}

# ================================
# Session Cookie Configuration
# ================================
server.servlet.session.timeout=24h
server.servlet.session.cookie.name=NEXUS_SESSION
server.servlet.session.cookie.same-site=none
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.http-only=true

# ================================
# Groq API Configuration
# ================================
groq.api.key=${GROQ_API_KEY}
groq.api.url=${GROQ_API_URL:https://api.groq.com/openai/v1}
groq.model=${GROQ_MODEL:meta-llama/llama-4-scout-17b-16e-instruct}

# ================================
# PostgreSQL (Neon)
# ================================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ================================
# Hikari Connection Pool
# ================================
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=0
spring.datasource.hikari.idle-timeout=120000
spring.datasource.hikari.max-lifetime=180000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.pool-name=NeonHikariPool

# ================================
# JPA / Hibernate
# ================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# ================================
# Redis
# ================================
spring.data.redis.url=${REDIS_URL}
spring.session.store-type=redis
spring.session.redis.namespace=nexus:session
spring.session.timeout=24h

# ================================
# Brevo API
# ================================
brevo.api.key=${BREVO_API_KEY}
brevo.api.url=${BREVO_API_URL:https://api.brevo.com/v3/smtp/email}
brevo.sender.email=${BREVO_SENDER_EMAIL}
brevo.sender.name=${BREVO_SENDER_NAME}

# ================================
# SMTP (Brevo)
# ================================
spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587
spring.mail.username=${BREVO_SMTP_USERNAME}
spring.mail.password=${BREVO_SMTP_KEY}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ================================
# Sender Identity
# ================================
email.sender.email=${EMAIL_SENDER}
email.sender.name=${EMAIL_SENDER_NAME:NEXUS AI}

# ================================
# OTP
# ================================
otp.expiration.minutes=10
otp.length=6

# ================================
# Logging
# ================================
logging.level.com.ai.chatbot_backend=INFO
logging.level.org.springframework.web=INFO
logging.level.org.springframework.boot=INFO
